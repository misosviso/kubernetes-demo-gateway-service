server:
  port: 8085

spring:
  application:
    name: GATEWAY-API
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service
              predicates:
                - Path=/user/{uuid}
            - id: notification-service
              uri: http://notification-service
              predicates:
                - Path=/notification/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG